<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Exemplo</title>

    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/froala-editor@latest/css/froala_editor.pkgd.min.css"
        rel="stylesheet" type="text/css" />

</head>

<body>

    <form action="/submit" method="POST" id="meuFormulario">

        <h3>Cadastre-se</h3>

        <div class="form-group">
            <label for="nome">Nome: </label>
            <input placeholder="Nome completo…" type="text" id="nome" name="nome">
        </div>

        <div class="form-group">
            <label for="data_nascimento">Data de Nascimento: </label>
            <input id="data_nascimento" type="date" name="data_nascimento">
        </div>

        <div class="form-group">
            <label for="email">Email: </label>
            <input type="email" id="email" name="email">
        </div>

        <div class="form-group">
            <label>Habilidades: </label>

            <label for="html">
                <input type="checkbox" id="html" name="habilidades" value="HTML">HTML
            </label>

            <label for="css">
                <input type="checkbox" id="css" name="habilidades" value="CSS">CSS
            </label>

            <label for="js">
                <input type="checkbox" id="js" name="habilidades" value="JS">JavaScript
            </label>
        </div>

        <div class="form-group">
            <label for="pais">País: </label>

            <select id="pais" name="pais">
                <option value="hexa">Brasil</option>
                <option value="EUA">EUA</option>
                <option value="Inglaterra">Inglaterra</option>
                <option value="uruguai">Uruguai</option>
                <option value="vaticano">Vaticano</option>
            </select>
        </div>

        <div class="form-group">
            <label for="agendamento">Escolha data e hora para entrevista:</label>

            <input type="datetime-local"
                id="agendamento"
                name="agendamento"
                min="2026-06-01T08:00"
                max="2026-06-30T18:00">
        </div>

        <div class="form-group">
            <label>Comentários:</label>

            <div id="froala-editor"></div>

            <input type="hidden" name="comentarios" id="comentarios">
        </div>

        <div class="form-group">
            <label for="time">Time que torce: </label>
            <input placeholder="Corinthians" type="text" id="time" name="time">
        </div>

        <div class="form-group">
            <label for="bola_de_ouro">Melhor jogador temporada 25/26: </label>

            <select id="jogador" name="jogador">
                <option value="Mbappé">Kylian Mbappé (Real Madrid / França)</option>
                <option value="Kane">Harry Kane (Bayern de Munique / Inglaterra)</option>
                <option value="Yamal">Lamine Yamal (Barcelona / Espanha)</option>
                <option value="Haaland">Erling Haaland (Manchester City / Noruega)</option>
                <option value="Rodinei">Rodinei (Olympiacos / Brasil)</option>
            </select>
        </div>

        <div class="form-group">
            <button type="submit">Enviar</button>
        </div>

    </form>

    <script src="https://cdn.jsdelivr.net/npm/froala-editor@latest/js/froala_editor.pkgd.min.js"></script>

    <script>
        const editor = new FroalaEditor('#froala-editor');
        document.getElementById('meuFormulario').addEventListener('submit', function () {
            document.getElementById('comentarios').value = editor.html.get();
        });
    </script>

</body>

</html>
